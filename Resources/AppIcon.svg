<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <path d="M512 0c-171 0-224 2-288 18C148 36 96 68 68 96c-28 28-60 80-78 156C2 316 0 369 0 512s2 196 18 260c18 76 50 128 78 156 28 28 80 60 156 78 64 16 117 18 260 18s196-2 260-18c76-18 128-50 156-78 28-28 60-80 78-156 16-64 18-117 18-260s-2-196-18-260c-18-76-50-128-78-156-28-28-80-60-156-78C736 2 683 0 512 0z"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="clipboard-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow-lg" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#312e81" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-md" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#312e81" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="lens-glass" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="handle-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#sheen)"/>
  </g>

  <!-- Content wrapper - centered in squircle -->
  <g transform="translate(80, 60)">

  <!-- Clipboard -->
  <g filter="url(#shadow-lg)" transform="translate(232, 165)">
    <!-- Board -->
    <rect x="0" y="40" width="380" height="480" rx="40" fill="url(#clipboard-fill)"/>
    <!-- Clip top -->
    <rect x="130" y="12" width="120" height="56" rx="14" fill="#c7d2fe" opacity="0.7"/>
    <rect x="152" y="0" width="76" height="36" rx="12" fill="#a5b4fc" opacity="0.6"/>

    <!-- Text lines -->
    <g opacity="0.18">
      <rect x="50" y="115" width="200" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="155" width="280" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="195" width="160" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="235" width="250" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="275" width="130" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="315" width="220" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="355" width="180" height="16" rx="8" fill="#4338ca"/>
      <rect x="50" y="395" width="240" height="16" rx="8" fill="#4338ca"/>
    </g>

    <!-- Fuzzy match highlights -->
    <rect x="48" y="152" width="120" height="22" rx="5" fill="#fbbf24" opacity="0.4"/>
    <rect x="48" y="272" width="85" height="22" rx="5" fill="#fbbf24" opacity="0.4"/>
    <rect x="48" y="352" width="100" height="22" rx="5" fill="#fbbf24" opacity="0.4"/>
  </g>

  <!-- Magnifying glass - bottom right, fully visible -->
  <g filter="url(#shadow-md)">
    <!-- Handle - extends from ring outward to bottom-right -->
    <line x1="640" y1="640" x2="720" y2="720" stroke="url(#handle-grad)" stroke-width="36" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <line x1="644" y1="636" x2="712" y2="704" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <!-- Outer ring -->
    <circle cx="570" cy="570" r="120" fill="none" stroke="url(#ring-grad)" stroke-width="34"/>
    <!-- Lens glass -->
    <circle cx="570" cy="570" r="103" fill="url(#lens-glass)"/>
    <!-- Glass reflection - large -->
    <ellipse cx="545" cy="538" rx="48" ry="32" fill="#fff" opacity="0.35" transform="rotate(-25, 545, 538)"/>
    <!-- Glass reflection - small -->
    <ellipse cx="530" cy="526" rx="16" ry="11" fill="#fff" opacity="0.5" transform="rotate(-25, 530, 526)"/>
  </g>

  </g> <!-- end content wrapper -->
</svg>
